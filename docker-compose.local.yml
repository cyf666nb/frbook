version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bookshare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: bookshare
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookshare-network

  redis:
    image: redis:7-alpine
    container_name: bookshare-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --notify-keyspace-events Ex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookshare-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookshare-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root123
      - DB_NAME=bookshare
      - DB_MAX_OPEN_CONNS=100
      - DB_MAX_IDLE_CONNS=10
      - DB_CONN_LIFETIME=1h
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_POOL_SIZE=100
      - REDIS_MIN_IDLE_CONNS=10
      - JWT_SECRET=bookshare-jwt-secret-key-2024
      - JWT_EXPIRE_TIME=168h
      - JWT_ISSUER=bookshare
      - PLATFORM_FEE_RATE=0.05
      - PLATFORM_MAX_AGE=30
      - PLATFORM_PAY_TIMEOUT=15m
      - PLATFORM_AUTO_SETTLE_DAY=7
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookshare-network

volumes:
  mysql_data:
  redis_data:

networks:
  bookshare-network:
    driver: bridge
